<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Musicloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        musicblue: {
                            light: '#E0F2FE',
                            DEFAULT: '#7DD3FC',
                            dark: '#0284C7',
                        },
                    },
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #a7d0f9 0%, #ffffff 50%, #90caf9 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #0284C7;
        }

        .glass-btn {
            background: rgba(125, 211, 252, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            color: #0284C7;
            transition: all 0.3s ease;
        }

        .glass-btn:hover:not(:disabled) { background: rgba(125, 211, 252, 0.5); transform: translateY(-1px); }
        
        .heart-btn {
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.8);
        }
        .heart-btn:hover { transform: scale(1.2); color: #ef4444; }

        audio {
            height: 30px;
            width: 100%;
            filter: opacity(0.6) sepia(10%) saturate(50%);
            margin-top: 8px;
        }
        audio:hover { filter: opacity(1); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(2, 132, 199, 0.2); border-radius: 3px; }
        .hidden-nav { display: none; }
    </style>
</head>
<body class="p-6 md:p-12 text-musicblue-dark">

    <header class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-3">
            <div class="glass-card w-12 h-12 flex items-center justify-center rounded-2xl border border-white/20">
                <span class="material-symbols-outlined text-musicblue-dark" style="font-variation-settings: 'FILL' 1; font-size: 30px;">
                    music_note
                </span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Musicloud</h1>
        </div>
        <button id="menuButton" class="lg:hidden glass-btn px-4 py-2">Menu</button>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <nav id="sidebar" class="hidden-nav glass-panel lg:block lg:col-span-1 p-6 space-y-4">
            <h3 class="text-xl font-semibold mb-6 px-3">Navigation</h3>
            <button onclick="showSection('recommender')" class="w-full text-left glass-btn px-5 py-3 block" data-active="true">Music Recommender</button>
            <button onclick="showSection('playlist')" class="w-full text-left glass-btn px-5 py-3 block">Liked Collection</button>
            <button onclick="showSection('events')" class="w-full text-left glass-btn px-5 py-3 block">Event Management</button>
        </nav>

        <section class="lg:col-span-3 glass-panel p-8 min-h-[60vh]">

            <div id="recommenderSection" class="content-section">
                <div class="mb-10">
                    <h2 class="text-4xl font-bold text-musicblue-dark mb-4">Discover the <span class="font-normal italic">sound</span> of Musicloud AI</h2>
                    <div class="flex gap-3">
                        <span class="glass-card px-4 py-1.5 text-xs">Smart Recommendations</span>
                        <span class="glass-card px-4 py-1.5 text-xs">Spotify Previews</span>
                    </div>
                </div>

                <div class="relative mb-12">
                    <input type="text" id="songSearch" placeholder="Search a song (e.g., 'Yellow')" class="w-full glass-input glass-card p-5 pl-14 text-xl rounded-full">
                    <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-musicblue text-3xl">search</span>
                    <div id="autocompleteList" class="absolute top-full left-0 right-0 mt-2 glass-panel p-3 max-h-60 overflow-y-auto hidden custom-scrollbar z-10"></div>
                </div>

                <div class="mb-6 flex justify-between items-center">
                    <p class="font-medium">Selected: <span id="selectedSongName" class="font-bold text-musicblue-dark">None</span></p>
                    <button onclick="getRecommendations()" id="recommendBtn" class="glass-btn px-8 py-3 flex items-center gap-2 font-semibold">
                        Show Recommendation <span class="material-symbols-outlined">auto_awesome</span>
                    </button>
                </div>

                <div id="recommendationsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-5 hidden"></div>
                <div id="recLoading" class="text-center py-10 hidden">Fetching from Spotify...</div>
            </div>

            <div id="playlistSection" class="content-section hidden">
                <h2 class="text-3xl font-bold mb-8">My Liked Collection</h2>
                <div id="playlistGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>

            <div id="eventsSection" class="content-section hidden">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-3xl font-bold">Event Management</h2>
                    <div class="flex gap-2">
                        <button onclick="toggleEventView('add')" class="glass-btn px-4 py-2 text-sm">Add Event</button>
                        <button onclick="toggleEventView('view')" class="glass-btn px-4 py-2 text-sm">View Events</button>
                    </div>
                </div>
                <div id="addEventForm" class="glass-card p-6 space-y-4">
                    <input type="text" id="eventName" placeholder="Event Name" class="glass-input p-3 w-full rounded-xl">
                    <input type="datetime-local" id="eventTime" class="glass-input p-3 w-full rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="eventCapacity" placeholder="Capacity" class="glass-input p-3 rounded-xl">
                        <input type="number" id="eventCharges" placeholder="Price ($)" class="glass-input p-3 rounded-xl">
                    </div>
                    <button onclick="addEvent()" class="glass-btn w-full py-3 font-bold">Create Event</button>
                </div>
                <div id="eventsList" class="hidden space-y-4"></div>
            </div>
        </section>
    </main>

    <script>
        // --- Core State & Navigation ---
        let allSongs = [];
        let selectedSong = null;

        const sidebar = document.getElementById('sidebar');
        const songSearch = document.getElementById('songSearch');
        const autocompleteList = document.getElementById('autocompleteList');
        const recsGrid = document.getElementById('recommendationsGrid');

        document.getElementById('menuButton').addEventListener('click', () => sidebar.classList.toggle('hidden-nav'));

        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(sectionId + 'Section').classList.remove('hidden');
            if (sectionId === 'playlist') loadPlaylist();
            if (sectionId === 'events') loadEvents();
        }

        // --- Recommendation Logic ---
        async function fetchSongs() {
            try {
                const res = await fetch('/api/songs');
                allSongs = await res.json();
            } catch (e) { console.error("Error loading songs"); }
        }

        songSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            autocompleteList.innerHTML = '';
            if (!val) { autocompleteList.classList.add('hidden'); return; }
            const matches = allSongs.filter(s => s.toLowerCase().includes(val)).slice(0, 10);
            if (matches.length > 0) {
                matches.forEach(song => {
                    const item = document.createElement('div');
                    item.className = 'px-4 py-2 cursor-pointer hover:bg-musicblue/20 rounded-lg';
                    item.textContent = song;
                    item.onclick = () => {
                        selectedSong = song;
                        songSearch.value = song;
                        document.getElementById('selectedSongName').textContent = song;
                        autocompleteList.classList.add('hidden');
                    };
                    autocompleteList.appendChild(item);
                });
                autocompleteList.classList.remove('hidden');
            }
        });

        async function getRecommendations() {
            if (!selectedSong) return alert("Select a song first");
            document.getElementById('recLoading').classList.remove('hidden');
            recsGrid.classList.add('hidden');

            const res = await fetch(`/api/recommend?song=${encodeURIComponent(selectedSong)}`);
            const data = await res.json();
            renderRecommendations(data);
            document.getElementById('recLoading').classList.add('hidden');
        }

        function renderRecommendations(recs) {
            recsGrid.innerHTML = '';
            recs.forEach(rec => {
                const card = document.createElement('div');
                card.className = 'glass-card p-4 space-y-2 relative group';
                const audioTag = rec.preview ? `<audio controls><source src="${rec.preview}" type="audio/mpeg"></audio>` : `<p class="text-[10px] opacity-40 italic mt-2 text-center">No preview</p>`;
                
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-xl">
                        <img src="${rec.poster}" class="w-full aspect-square object-cover">
                        <button onclick='likeSong(${JSON.stringify(rec)})' class="absolute top-2 right-2 p-2 bg-black/20 backdrop-blur-md rounded-full heart-btn">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
                        </button>
                    </div>
                    <p class="font-bold text-sm truncate">${rec.title}</p>
                    <p class="text-xs opacity-60 truncate">${rec.artist}</p>
                    ${audioTag}
                `;
                recsGrid.appendChild(card);
            });
            recsGrid.classList.remove('hidden');
        }

        // --- Liked Collection Logic ---
        async function likeSong(song) {
            await fetch('/api/like', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(song)
            });
            alert("Added to Liked Collection ❤️");
        }

        async function loadPlaylist() {
            const grid = document.getElementById('playlistGrid');
            grid.innerHTML = 'Loading...';
            const res = await fetch('/api/playlist');
            const data = await res.json();
            grid.innerHTML = '';
            if (data.length === 0) grid.innerHTML = '<p class="col-span-4 opacity-50">Your collection is empty.</p>';
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="glass-card p-4 text-center">
                        <img src="${item.poster}" class="rounded-lg mb-3">
                        <p class="font-bold text-sm truncate">${item.title}</p>
                        <p class="text-xs opacity-60">${item.artist}</p>
                    </div>
                `;
            });
        }

        // --- Events Logic (Placeholders for your logic) ---
        function toggleEventView(v) {
            document.getElementById('addEventForm').classList.toggle('hidden', v !== 'add');
            document.getElementById('eventsList').classList.toggle('hidden', v !== 'view');
        }

        // Initial Load
        fetchSongs();
    </script>
</body>
</html>
